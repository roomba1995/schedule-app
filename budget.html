<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>予算管理 - ホテル滞在タイムスケジュール管理システム</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── Budget-specific layout ── */
    .budget-wrap { max-width: 1200px; margin: 0 auto; padding: 24px; }

    .budget-badge {
      background: #27ae60;
      color: white;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      margin-left: 6px;
      vertical-align: middle;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .back-link {
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      font-size: 13px;
      padding: 6px 14px;
      border-radius: var(--radius);
      transition: all 0.2s;
    }
    .back-link:hover { background: rgba(255,255,255,0.15); color: white; }

    /* ── Main tab bar ── */
    .main-tabs {
      display: flex;
      border-bottom: 2px solid var(--border);
      margin-bottom: 24px;
      background: var(--card-bg);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 0 4px;
    }
    .main-tab-btn {
      padding: 12px 22px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: all 0.15s;
    }
    .main-tab-btn:hover { color: var(--text); }
    .main-tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 700; }

    /* ── KPI cards ── */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    @media (max-width: 900px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }
    .kpi-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      box-shadow: var(--shadow);
    }
    .kpi-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    .kpi-value { font-size: 22px; font-weight: 700; }
    .kpi-sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

    /* ── Hotel cards ── */
    .hotel-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 14px;
    }
    .hotel-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .hotel-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
    .hotel-card-body { display: flex; justify-content: space-between; align-items: flex-start; padding: 16px; gap: 12px; cursor: pointer; }
    .hotel-card-footer { display: flex; gap: 6px; padding: 10px 16px; border-top: 1px solid var(--border); }
    .hotel-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }

    /* ── Group tags ── */
    .group-tag {
      display: inline-block;
      padding: 2px 8px;
      background: #ecf0f1;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
      color: #2c3e50;
      margin: 1px;
    }

    /* ── Amount inputs ── */
    input[type=number] { text-align: right; }

    /* ── Color indicators ── */
    .pos { color: #27ae60; }
    .neg { color: #e74c3c; }

    /* ── Category dot ── */
    .cat-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      margin-right: 5px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- ── Header ── -->
    <header>
      <h1>🏨 スケジュール管理 <span class="budget-badge">Budget</span></h1>
      <div class="header-spacer"></div>
      <div class="header-actions">
        <a href="index.html" class="back-link">← メインページへ</a>
      </div>
    </header>

    <!-- ── Content ── -->
    <div style="flex:1;overflow-y:auto;">
      <div class="budget-wrap">
        <!-- Main tab navigation -->
        <div class="main-tabs" id="main-tabs">
          <button class="main-tab-btn active" onclick="BudgetApp.navigate('dashboard')">📊 ダッシュボード</button>
          <button class="main-tab-btn" onclick="BudgetApp.navigate('hotels')">🏨 ホテル一覧</button>
        </div>

        <!-- Content area -->
        <div id="budget-content">
          <div style="padding:40px;text-align:center;color:#7f8c8d">読み込み中...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal container -->
  <div id="modal-container"></div>

  <!-- Scripts -->
  <script src="js/master-data.js"></script>
  <script src="js/data.js"></script>
  <script src="js/budget-data.js"></script>
  <script src="js/budget.js"></script>
</body>
</html>
