<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ホテル予算管理システム</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- ── Header ── -->
    <header>
      <div class="header-logo">💰</div>
      <h1>ホテル予算管理システム</h1>
      <div class="header-spacer"></div>
      <div class="header-actions">
        <button class="btn btn-outline-white btn-sm" onclick="BudgetApp.showExportModal()">
          ↓ エクスポート
        </button>
      </div>
    </header>

    <!-- ── Main nav ── -->
    <nav class="main-nav" id="main-nav">
      <button class="nav-btn active" onclick="BudgetApp.navigate('dashboard')">
        <span class="nav-icon">📊</span>ダッシュボード
      </button>
      <button class="nav-btn" onclick="BudgetApp.navigate('hotels')">
        <span class="nav-icon">🏨</span>ホテル一覧
      </button>
    </nav>

    <!-- ── Content ── -->
    <main id="main-content">
      <div class="loading">読み込み中...</div>
    </main>
  </div>

  <!-- Modal -->
  <div id="modal-root"></div>
  <!-- Toast -->
  <div id="toast-root"></div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
