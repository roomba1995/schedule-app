<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>スケジュール管理</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #3b5bdb;
      --border: #dde2ec;
      --bg: #f4f6f9;
      --surface: #fff;
      --text: #1e2532;
      --muted: #7a8499;
      --radius: 8px;
      --col-time: 54px;
      --col-date: 140px;
      --row-hour: 60px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 13px;
    }

    /* ── App Header ── */
    .app-header {
      background: #2c3e6b;
      color: #fff;
      height: 48px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 20px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .app-title { font-size: 1rem; font-weight: 700; }

    /* ── Page ── */
    .page { padding: 16px 20px; }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      margin-bottom: 16px;
      overflow: hidden;
    }

    /* ── Sport Tags ── */
    .sport-tags-row { padding: 12px 16px; display: flex; flex-wrap: wrap; gap: 6px; }
    .sport-tag {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      user-select: none;
      transition: opacity 0.15s;
    }
    .sport-tag:hover { opacity: 0.85; }

    /* ── Section Header ── */
    .section-header {
      padding: 12px 16px;
      font-weight: 700;
      font-size: 0.95rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── Sport Tabs ── */
    .tab-bar {
      display: flex;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      padding: 0 8px;
    }
    .tab-btn {
      background: none;
      border: none;
      padding: 10px 14px;
      font-size: 0.875rem;
      font-family: inherit;
      cursor: pointer;
      color: var(--muted);
      white-space: nowrap;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.1s;
    }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }
    .tab-btn:hover { color: var(--text); }

    /* ── Toolbar ── */
    .toolbar {
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .btn {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-outline { background: none; border: 1px solid var(--border); color: var(--text); }
    .btn-danger { background: #e05c5c; color: #fff; }
    .btn-secondary { background: #e9ecef; color: var(--text); }
    .ml-auto { margin-left: auto; }

    /* ── Legend ── */
    .legend {
      padding: 6px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      font-size: 0.72rem;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
    }
    .legend-item { display: flex; align-items: center; gap: 4px; }
    .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

    /* ── Date Nav ── */
    .date-nav {
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .nav-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 0.78rem;
      cursor: pointer;
      font-family: inherit;
    }
    .nav-btn:hover { background: var(--bg); }
    .date-range-text { font-size: 0.82rem; color: var(--muted); margin-left: 4px; }

    /* ── Calendar Scroll ── */
    .cal-scroll {
      overflow: auto;
      max-height: 620px;
    }
    .cal-table {
      border-collapse: collapse;
      table-layout: fixed;
    }

    /* Sticky header */
    .cal-table thead th {
      position: sticky;
      top: 0;
      z-index: 20;
      background: #fff;
      border-bottom: 2px solid var(--border);
    }
    .time-th {
      width: var(--col-time);
      min-width: var(--col-time);
      position: sticky;
      left: 0;
      z-index: 30;
    }
    .date-th {
      width: var(--col-date);
      min-width: var(--col-date);
      border-left: 1px solid var(--border);
    }

    /* Date header content */
    .date-th-inner {
      padding: 6px 4px;
      text-align: center;
    }
    .date-th-label {
      font-size: 0.9rem;
      font-weight: 700;
      margin-bottom: 3px;
    }
    .date-th-label.weekend-sun { color: #c62828; }
    .date-th-label.weekend-sat { color: #1565c0; }
    .date-th-label.is-today { color: var(--primary); }

    .copy-save-btns {
      display: flex;
      gap: 3px;
      justify-content: center;
      margin-bottom: 4px;
    }
    .btn-xs {
      background: none;
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1px 7px;
      font-size: 0.7rem;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-xs:hover { background: var(--bg); }

    /* ── Day Category ── */
    .day-cat-container { padding: 0 2px 4px; }
    .day-cat-sel {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 4px;
      font-size: 0.7rem;
      font-family: inherit;
      background: #fff;
      cursor: pointer;
      color: var(--text);
      transition: background 0.1s, color 0.1s;
    }

    /* ── Body Cells ── */
    .time-td {
      width: var(--col-time);
      height: var(--row-hour);
      text-align: right;
      padding: 2px 6px 0;
      font-size: 0.68rem;
      color: var(--muted);
      vertical-align: top;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      background: #fff;
      position: sticky;
      left: 0;
      z-index: 5;
    }
    .event-td {
      width: var(--col-date);
      height: var(--row-hour);
      border-left: 1px solid var(--border);
      border-bottom: 1px solid #eee;
      position: relative;
      cursor: pointer;
      vertical-align: top;
      overflow: visible;
    }
    .event-td:hover { background: #f8f9ff; }

    /* ── Event Blocks ── */
    .evt {
      position: absolute;
      left: 2px;
      right: 2px;
      border-radius: 3px;
      padding: 2px 4px;
      font-size: 0.7rem;
      font-weight: 600;
      overflow: hidden;
      cursor: pointer;
      z-index: 2;
      border-left: 3px solid;
      line-height: 1.35;
    }
    .evt:hover { filter: brightness(0.93); }
    .evt-sub { font-weight: 400; font-size: 0.65rem; opacity: 0.8; }

    /* ── Modal ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .overlay.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: var(--radius);
      padding: 24px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      max-height: 92vh;
      overflow-y: auto;
    }
    .modal h2 { font-size: 1rem; margin-bottom: 16px; }
    .fg { margin-bottom: 12px; }
    .fg label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .fg input, .fg select, .fg textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 0.85rem;
      font-family: inherit;
      outline: none;
      color: var(--text);
    }
    .fg input:focus, .fg select:focus, .fg textarea:focus { border-color: var(--primary); }
    .fg-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .modal-actions { display: flex; gap: 8px; margin-top: 18px; justify-content: flex-end; }
  </style>
</head>
<body>

<div class="app-header">
  <span class="app-title">スケジュール管理</span>
</div>

<div class="page">
  <!-- Sport Tags Overview -->
  <div class="card">
    <div style="padding: 10px 16px; border-bottom: 1px solid var(--border)">
      <div style="font-size:0.75rem; color:var(--muted); margin-bottom:8px">担当競技</div>
      <div id="sport-tags-container" class="sport-tags-row" style="padding:0"></div>
    </div>
  </div>

  <!-- Timetable -->
  <div class="card">
    <div class="section-header">📅 タイムスケジュール</div>
    <div class="tab-bar" id="sport-tabs"></div>
    <div class="toolbar">
      <button class="btn btn-primary" onclick="openAddModal()">＋ イベント追加</button>
      <button class="btn btn-outline" onclick="exportWord()" style="margin-left:auto">📄 Word出力</button>
    </div>
    <div class="legend" id="legend"></div>
    <div class="date-nav">
      <button class="nav-btn" onclick="shiftDates(-7)">◀ 前週</button>
      <button class="nav-btn" onclick="shiftDates(-1)">◀</button>
      <button class="nav-btn" onclick="gotoToday()">今日</button>
      <button class="nav-btn" onclick="shiftDates(1)">▶</button>
      <button class="nav-btn" onclick="shiftDates(7)">翌週 ▶</button>
      <span class="date-range-text" id="date-range-text"></span>
    </div>
    <div class="cal-scroll">
      <table class="cal-table" id="cal-table"></table>
    </div>
  </div>
</div>

<!-- Event Modal -->
<div class="overlay" id="event-overlay">
  <div class="modal">
    <h2 id="modal-title">イベント追加</h2>
    <div class="fg">
      <label>タイトル</label>
      <input type="text" id="f-title" placeholder="タイトルを入力"/>
    </div>
    <div class="fg">
      <label>日付</label>
      <input type="date" id="f-date"/>
    </div>
    <div class="fg-row">
      <div class="fg">
        <label>開始時刻</label>
        <input type="time" id="f-start" value="09:00"/>
      </div>
      <div class="fg">
        <label>終了時刻</label>
        <input type="time" id="f-end" value="10:00"/>
      </div>
    </div>
    <div class="fg">
      <label>カテゴリ</label>
      <select id="f-cat"></select>
    </div>
    <div class="fg">
      <label>場所</label>
      <input type="text" id="f-location" placeholder="場所（任意）"/>
    </div>
    <div class="fg">
      <label>メモ</label>
      <textarea id="f-note" rows="2" placeholder="メモ（任意）"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-danger" id="btn-delete" style="display:none; margin-right:auto" onclick="deleteEvt()">削除</button>
      <button class="btn btn-secondary" onclick="closeModal('event-overlay')">キャンセル</button>
      <button class="btn btn-primary" onclick="saveEvt()">保存</button>
    </div>
  </div>
</div>

<!-- Copy Modal -->
<div class="overlay" id="copy-overlay">
  <div class="modal" style="max-width:340px">
    <h2>日程をコピー</h2>
    <p style="margin-bottom:14px; font-size:0.85rem; color:var(--muted)">
      <b id="copy-from-lbl"></b> のイベントと日程区分を別の日にコピーします
    </p>
    <div class="fg">
      <label>コピー先の日付</label>
      <input type="date" id="copy-to"/>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('copy-overlay')">キャンセル</button>
      <button class="btn btn-primary" onclick="doCopy()">コピー</button>
    </div>
  </div>
</div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────
const SPORTS = [
  { id: 'athletics',     name: '陸上',        color: '#e74c3c' },
  { id: 'badminton',     name: 'バドミントン', color: '#3498db' },
  { id: 'basketball3x3', name: 'バスケ3×3',   color: '#e67e22' },
  { id: 'gymnastics',    name: '体操',        color: '#9b59b6' },
  { id: 'handball',      name: 'ハンドボール', color: '#1abc9c' },
  { id: 'karate',        name: '空手',        color: '#c0392b' },
  { id: 'tabletennis',   name: '卓球',        color: '#f39c12' },
  { id: 'softtennis',    name: 'ソフトテニス', color: '#27ae60' },
];

const EVENT_CATS = [
  { id: 'sleep',      name: '起床・就寝',          bg: '#f5f5f5', color: '#757575' },
  { id: 'meal',       name: '食事',                bg: '#fff8e1', color: '#f57c00' },
  { id: 'practice',   name: '練習・トレーニング',   bg: '#e8eaf6', color: '#3949ab' },
  { id: 'compete',    name: '競技',                bg: '#ffebee', color: '#c62828' },
  { id: 'travel',     name: '移動・交通',           bg: '#e3f2fd', color: '#1565c0' },
  { id: 'meeting',    name: 'ミーティング',         bg: '#e0f2f1', color: '#00695c' },
  { id: 'medical',    name: '医療・ケア',           bg: '#e8f5e9', color: '#2e7d32' },
  { id: 'rest',       name: '休息・自由時間',       bg: '#fafafa', color: '#9e9e9e' },
  { id: 'checkinout', name: 'チェックイン/アウト',  bg: '#eceff1', color: '#37474f' },
  { id: 'other',      name: 'その他',              bg: '#f9f9f9', color: '#9e9e9e' },
];

// 日程区分
const DAY_CATS = ['', 'チェックイン日', '練習日', '競技日', '滞在日', 'チェックアウト日'];
const DAY_CAT_STYLES = {
  'チェックイン日':  { bg: '#e8f5e9', color: '#2e7d32', border: '#2e7d32' },
  '練習日':          { bg: '#e3f2fd', color: '#1565c0', border: '#1565c0' },
  '競技日':          { bg: '#ffebee', color: '#c62828', border: '#c62828' },
  '滞在日':          { bg: '#fff8e1', color: '#e65100', border: '#e65100' },
  'チェックアウト日': { bg: '#f3e5f5', color: '#6a1b9a', border: '#6a1b9a' },
};

const DAY_NAMES = ['日', '月', '火', '水', '木', '金', '土'];
const HOUR_START = 6;
const HOUR_END   = 24;
const DISPLAY_DAYS = 14;
const ROW_PX = 60;

// ── State ──────────────────────────────────────────────────────────────────
let currentSport = SPORTS[0].id;

// Default: start from Monday of current week
let rangeStart = (() => {
  const d = new Date();
  d.setHours(0, 0, 0, 0);
  const dow = d.getDay();
  d.setDate(d.getDate() - (dow === 0 ? 6 : dow - 1));
  return d;
})();

// data[sportId][dateStr] = { events: [...], dayCat: '' }
let data = (() => {
  try { return JSON.parse(localStorage.getItem('sched_v3') || '{}'); }
  catch { return {}; }
})();

let editingEvtId   = null;
let editingEvtDate = null;
let copyFromDate   = null;

// ── Persistence ────────────────────────────────────────────────────────────
function persist() {
  localStorage.setItem('sched_v3', JSON.stringify(data));
}

function getDateData(sportId, dateStr) {
  if (!data[sportId]) data[sportId] = {};
  if (!data[sportId][dateStr]) data[sportId][dateStr] = { events: [], dayCat: '' };
  return data[sportId][dateStr];
}

function getEvents(sportId, dateStr) {
  return (getDateData(sportId, dateStr).events || [])
    .slice()
    .sort((a, b) => a.start.localeCompare(b.start));
}

function getDayCat(sportId, dateStr) {
  return ((data[sportId] || {})[dateStr] || {}).dayCat || '';
}

// ── Day Category ────────────────────────────────────────────────────────────
function setDayCat(sportId, dateStr, cat) {
  getDateData(sportId, dateStr).dayCat = cat;
  persist();
  applyDayCatStyle(dateStr, cat);
}

function applyDayCatStyle(dateStr, cat) {
  const sel = document.getElementById('daycat-' + dateStr);
  if (!sel) return;
  const s = DAY_CAT_STYLES[cat];
  if (s) {
    sel.style.background   = s.bg;
    sel.style.color        = s.color;
    sel.style.borderColor  = s.border;
    sel.style.fontWeight   = '700';
  } else {
    sel.style.background   = '';
    sel.style.color        = '';
    sel.style.borderColor  = '';
    sel.style.fontWeight   = '';
  }
}

// ── Helpers ────────────────────────────────────────────────────────────────
function isoDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function todayStr() {
  const t = new Date(); t.setHours(0,0,0,0); return isoDate(t);
}
function toMins(t) {
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}
function escHtml(s) {
  return String(s || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function getDateRange() {
  const arr = [];
  for (let i = 0; i < DISPLAY_DAYS; i++) {
    const d = new Date(rangeStart);
    d.setDate(rangeStart.getDate() + i);
    arr.push(d);
  }
  return arr;
}

// ── Navigation ─────────────────────────────────────────────────────────────
function shiftDates(n) {
  rangeStart.setDate(rangeStart.getDate() + n);
  renderCalendar();
}
function gotoToday() {
  const d = new Date(); d.setHours(0,0,0,0);
  const dow = d.getDay();
  d.setDate(d.getDate() - (dow === 0 ? 6 : dow - 1));
  rangeStart = d;
  renderCalendar();
}
function switchSport(sportId) {
  currentSport = sportId;
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.sport === sportId);
  });
  renderCalendar();
}

// ── Render ─────────────────────────────────────────────────────────────────
function renderAll() {
  renderSportTags();
  renderSportTabs();
  renderLegend();
  renderCalendar();
}

function renderSportTags() {
  document.getElementById('sport-tags-container').innerHTML = SPORTS.map(s =>
    `<span class="sport-tag" style="background:${s.color}" onclick="switchSport('${s.id}')">${s.name}</span>`
  ).join('');
}

function renderSportTabs() {
  document.getElementById('sport-tabs').innerHTML = SPORTS.map(s =>
    `<button class="tab-btn ${s.id === currentSport ? 'active' : ''}" data-sport="${s.id}" onclick="switchSport('${s.id}')">${s.name}</button>`
  ).join('');
}

function renderLegend() {
  document.getElementById('legend').innerHTML = EVENT_CATS.map(c =>
    `<div class="legend-item"><div class="legend-dot" style="background:${c.color}"></div><span>${c.name}</span></div>`
  ).join('');
}

function renderCalendar() {
  const dates  = getDateRange();
  const today  = todayStr();
  const first  = dates[0];
  const last   = dates[dates.length - 1];

  document.getElementById('date-range-text').textContent =
    `${first.getMonth()+1}/${first.getDate()} 〜 ${last.getMonth()+1}/${last.getDate()}`;

  // ── Header row ──
  const headerCols = dates.map(d => {
    const ds  = isoDate(d);
    const dow = d.getDay();
    const cat = getDayCat(currentSport, ds);
    const cs  = DAY_CAT_STYLES[cat] || {};

    let lblCls = 'date-th-label';
    if (ds === today)  lblCls += ' is-today';
    else if (dow === 0) lblCls += ' weekend-sun';
    else if (dow === 6) lblCls += ' weekend-sat';

    const selStyle = cat
      ? `background:${cs.bg};color:${cs.color};border-color:${cs.border};font-weight:700`
      : '';

    return `<th class="date-th">
      <div class="date-th-inner">
        <div class="${lblCls}">${d.getMonth()+1}/${d.getDate()}(${DAY_NAMES[dow]})</div>
        <div class="copy-save-btns">
          <button class="btn-xs" onclick="openCopyModal('${ds}')">コピー</button>
          <button class="btn-xs" onclick="persist()">保存</button>
        </div>
        <div class="day-cat-container">
          <select id="daycat-${ds}" class="day-cat-sel" style="${selStyle}"
                  onchange="setDayCat('${currentSport}','${ds}',this.value)">
            ${DAY_CATS.map(c => `<option value="${c}" ${c === cat ? 'selected' : ''}>${c || '-- 区分 --'}</option>`).join('')}
          </select>
        </div>
      </div>
    </th>`;
  }).join('');

  // ── Body rows (one per hour) ──
  let bodyRows = '';
  for (let h = HOUR_START; h < HOUR_END; h++) {
    const timeLbl = `${String(h).padStart(2,'0')}:00`;
    const dateCells = dates.map(d => {
      const ds   = isoDate(d);
      const evts = getEvents(currentSport, ds).filter(ev => Math.floor(toMins(ev.start) / 60) === h);

      const evHtml = evts.map(ev => {
        const cat    = EVENT_CATS.find(c => c.id === ev.catId) || EVENT_CATS[EVENT_CATS.length - 1];
        const startM = toMins(ev.start);
        const endM   = toMins(ev.end);
        const top    = ((startM % 60) / 60) * ROW_PX;
        const height = Math.max(((endM - startM) / 60) * ROW_PX, 18);
        const loc    = ev.location ? `<span class="evt-sub"> ${escHtml(ev.location)}</span>` : '';

        return `<div class="evt"
          style="top:${top}px;height:${height}px;background:${cat.bg};border-left-color:${cat.color};color:${cat.color}"
          onclick="event.stopPropagation();openEditModal('${ev.id}','${ds}')">
          <div>${escHtml(ev.title)}${loc}</div>
          <div class="evt-sub">${ev.start}〜${ev.end}</div>
        </div>`;
      }).join('');

      return `<td class="event-td" onclick="openAddModal('${ds}',${h})">${evHtml}</td>`;
    }).join('');

    bodyRows += `<tr>
      <td class="time-td">${timeLbl}</td>
      ${dateCells}
    </tr>`;
  }

  document.getElementById('cal-table').innerHTML =
    `<thead><tr><th class="time-th"></th>${headerCols}</tr></thead><tbody>${bodyRows}</tbody>`;
}

// ── Modal ──────────────────────────────────────────────────────────────────
function buildCatOpts(selId) {
  return EVENT_CATS.map(c =>
    `<option value="${c.id}" ${c.id === selId ? 'selected' : ''}>${c.name}</option>`
  ).join('');
}

function openAddModal(dateStr, hour) {
  editingEvtId   = null;
  editingEvtDate = null;
  document.getElementById('modal-title').textContent = 'イベント追加';
  document.getElementById('btn-delete').style.display = 'none';
  document.getElementById('f-title').value    = '';
  document.getElementById('f-note').value     = '';
  document.getElementById('f-location').value = '';
  document.getElementById('f-date').value     = dateStr || isoDate(new Date());
  const h = hour !== undefined ? hour : 9;
  document.getElementById('f-start').value = `${String(h).padStart(2,'0')}:00`;
  document.getElementById('f-end').value   = `${String(Math.min(h+1,23)).padStart(2,'0')}:00`;
  document.getElementById('f-cat').innerHTML = buildCatOpts('meal');
  document.getElementById('event-overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-title').focus(), 50);
}

function openEditModal(evtId, dateStr) {
  const ev = getEvents(currentSport, dateStr).find(e => e.id === evtId);
  if (!ev) return;
  editingEvtId   = evtId;
  editingEvtDate = dateStr;
  document.getElementById('modal-title').textContent = 'イベント編集';
  document.getElementById('btn-delete').style.display = '';
  document.getElementById('f-title').value    = ev.title;
  document.getElementById('f-date').value     = dateStr;
  document.getElementById('f-start').value    = ev.start;
  document.getElementById('f-end').value      = ev.end;
  document.getElementById('f-location').value = ev.location || '';
  document.getElementById('f-note').value     = ev.note || '';
  document.getElementById('f-cat').innerHTML  = buildCatOpts(ev.catId || 'other');
  document.getElementById('event-overlay').classList.add('open');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function saveEvt() {
  const title    = document.getElementById('f-title').value.trim();
  if (!title) { document.getElementById('f-title').focus(); return; }
  const dateStr  = document.getElementById('f-date').value;
  const start    = document.getElementById('f-start').value;
  const end      = document.getElementById('f-end').value;
  const catId    = document.getElementById('f-cat').value;
  const location = document.getElementById('f-location').value.trim();
  const note     = document.getElementById('f-note').value.trim();

  if (!dateStr || !start || !end) return;
  if (start >= end) { alert('終了時刻は開始時刻より後にしてください'); return; }

  if (editingEvtId && editingEvtDate) {
    // Remove from old date
    const dd = getDateData(currentSport, editingEvtDate);
    dd.events = dd.events.filter(e => e.id !== editingEvtId);
    // Add to (possibly new) date
    getDateData(currentSport, dateStr).events.push(
      { id: editingEvtId, title, start, end, catId, location, note }
    );
  } else {
    getDateData(currentSport, dateStr).events.push(
      { id: crypto.randomUUID(), title, start, end, catId, location, note }
    );
  }
  persist();
  closeModal('event-overlay');
  renderCalendar();
}

function deleteEvt() {
  if (!editingEvtId || !editingEvtDate) return;
  const dd = getDateData(currentSport, editingEvtDate);
  dd.events = dd.events.filter(e => e.id !== editingEvtId);
  persist();
  closeModal('event-overlay');
  renderCalendar();
}

// ── Copy ───────────────────────────────────────────────────────────────────
function openCopyModal(fromDate) {
  copyFromDate = fromDate;
  const d = new Date(fromDate + 'T00:00:00');
  document.getElementById('copy-from-lbl').textContent =
    `${d.getMonth()+1}/${d.getDate()}(${DAY_NAMES[d.getDay()]})`;
  document.getElementById('copy-to').value = '';
  document.getElementById('copy-overlay').classList.add('open');
}

function doCopy() {
  const toDate = document.getElementById('copy-to').value;
  if (!toDate || !copyFromDate) return;
  const fromDd = getDateData(currentSport, copyFromDate);
  const toDd   = getDateData(currentSport, toDate);
  toDd.events  = fromDd.events.map(ev => ({ ...ev, id: crypto.randomUUID() }));
  toDd.dayCat  = fromDd.dayCat || '';
  persist();
  closeModal('copy-overlay');
  renderCalendar();
}

// ── Word Export ─────────────────────────────────────────────────────────────
function exportWord() {
  const sport = SPORTS.find(s => s.id === currentSport);
  const dates = getDateRange();

  // ── Header cells (with day category) ──
  const thCells = dates.map(d => {
    const ds  = isoDate(d);
    const dow = d.getDay();
    const cat = getDayCat(currentSport, ds);
    const cs  = DAY_CAT_STYLES[cat] || {};
    const dayColor = dow === 0 ? 'color:#cc0000' : dow === 6 ? 'color:#1565c0' : '';

    // 日程区分を日付の下に表示
    const catHtml = cat
      ? `<br/><span style="display:inline-block;margin-top:3pt;padding:1pt 5pt;border-radius:3pt;background:${cs.bg};color:${cs.color};font-size:8pt;font-weight:bold">${escHtml(cat)}</span>`
      : '';

    return `<th style="border:1px solid #ccc;padding:4px 6px;text-align:center;background:#f8f8f8;width:80pt;${dayColor}">
      <b>${d.getMonth()+1}/${d.getDate()}(${DAY_NAMES[dow]})</b>${catHtml}
    </th>`;
  }).join('');

  // ── Body rows ──
  let bodyRows = '';
  for (let h = HOUR_START; h < HOUR_END; h++) {
    const dateCells = dates.map(d => {
      const ds   = isoDate(d);
      const evts = getEvents(currentSport, ds).filter(ev => Math.floor(toMins(ev.start) / 60) === h);
      const evHtml = evts.map(ev => {
        const cat = EVENT_CATS.find(c => c.id === ev.catId) || EVENT_CATS[EVENT_CATS.length - 1];
        return `<div style="background:${cat.bg};border-left:3px solid ${cat.color};padding:2px 4px;margin-bottom:2px;font-size:9pt">
          <b>${escHtml(ev.title)}</b>${ev.location ? ` <span style="color:#666">${escHtml(ev.location)}</span>` : ''}<br/>
          <span style="color:#999;font-size:8pt">${ev.start}〜${ev.end}</span>
        </div>`;
      }).join('');
      return `<td style="border:1px solid #ccc;padding:3px;vertical-align:top;min-height:36pt">${evHtml || '&nbsp;'}</td>`;
    }).join('');

    bodyRows += `<tr>
      <td style="border:1px solid #ccc;padding:2px 6px;text-align:right;white-space:nowrap;font-size:9pt;color:#888;background:#fafafa">${String(h).padStart(2,'0')}:00</td>
      ${dateCells}
    </tr>`;
  }

  const first = dates[0], last = dates[dates.length-1];
  const rangeLabel = `${first.getMonth()+1}/${first.getDate()} 〜 ${last.getMonth()+1}/${last.getDate()}`;

  const htmlDoc = `<html xmlns:o="urn:schemas-microsoft-com:office:office"
    xmlns:w="urn:schemas-microsoft-com:office:word"
    xmlns="http://www.w3.org/TR/REC-html40">
<head>
<meta charset="UTF-8"/>
<meta name="ProgId" content="Word.Document"/>
<title>タイムスケジュール</title>
<style>
  body { font-family: "Meiryo","MS Gothic",sans-serif; font-size:10pt; }
  table { border-collapse:collapse; }
</style>
</head>
<body>
<h2 style="font-size:13pt;margin-bottom:4pt">タイムスケジュール — ${escHtml(sport?.name || '')}</h2>
<p style="font-size:9pt;color:#666;margin-bottom:10pt">期間: ${escHtml(rangeLabel)}　出力日: ${new Date().toLocaleDateString('ja-JP')}</p>
<table style="width:100%">
  <thead>
    <tr>
      <th style="border:1px solid #ccc;padding:4px;width:36pt;background:#f8f8f8">時間</th>
      ${thCells}
    </tr>
  </thead>
  <tbody>${bodyRows}</tbody>
</table>
</body>
</html>`;

  const blob = new Blob(['\ufeff' + htmlDoc], { type: 'application/msword;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `タイムスケジュール_${sport?.name || 'schedule'}_${isoDate(new Date())}.doc`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ── Event Listeners ────────────────────────────────────────────────────────
document.getElementById('event-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal('event-overlay');
});
document.getElementById('copy-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal('copy-overlay');
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal('event-overlay'); closeModal('copy-overlay'); }
});

// ── Init ───────────────────────────────────────────────────────────────────
renderAll();
</script>
</body>
</html>
