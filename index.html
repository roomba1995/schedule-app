<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ホテル滞在タイムスケジュール管理システム</title>
  <link rel="stylesheet" href="css/style.css?v=3">
  <!-- SheetJS for Excel export -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
</head>
<body>
  <div id="app">
    <!-- ── Header ── -->
    <header>
      <h1>🏨 ホテル滞在スケジュール管理</h1>
      <nav>
        <a href="#dashboard">ダッシュボード</a>
        <a href="#data">データ管理</a>
        <a href="#soccer">サッカー設定</a>
      </nav>
      <div class="header-spacer"></div>
      <div class="header-actions">
        <button class="btn btn-outline btn-sm" style="color:white;border-color:rgba(255,255,255,0.5)"
          onclick="ExportManager.showExportModal(null, null)">
          ↓ 全体エクスポート
        </button>
      </div>
    </header>

    <!-- ── Main Layout ── -->
    <div class="main-wrapper">
      <!-- Sidebar -->
      <aside id="sidebar">
        <!-- Populated by JS -->
        <div style="padding:20px;text-align:center;color:#7f8c8d;font-size:12px;">
          読み込み中...
        </div>
      </aside>

      <!-- Main Content -->
      <main id="main-content" style="padding:24px">
        <!-- Populated by JS -->
        <div style="padding:40px;text-align:center;color:#7f8c8d;">
          <div style="font-size:48px;margin-bottom:16px">📅</div>
          <div>読み込み中...</div>
        </div>
      </main>
    </div>
  </div>

  <!-- Scripts (order matters) -->
  <script src="js/master-data.js?v=3"></script>
  <script src="js/data.js?v=3"></script>
  <script src="js/schedule.js?v=3"></script>
  <script src="js/export.js?v=3"></script>
  <script src="js/app.js?v=3"></script>
</body>
</html>
